name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main
      - "set/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  branch-check:
    name: Branch Naming & Target
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "PR: ${HEAD_REF} → ${BASE_REF}"

          # --- Source branch rules ---
          if [[ "${BASE_REF}" == main ]]; then
            # PRs to main: feature/* or hotfix/* or chore/*
            if [[ ! "${HEAD_REF}" =~ ^(feature|hotfix|chore)/ ]]; then
              echo "::error::PRs to 'main' must use a source branch matching 'feature/*', 'hotfix/*', or 'chore/*'. Got: '${HEAD_REF}'"
              exit 1
            fi
          elif [[ "${BASE_REF}" == set/* ]]; then
            # PRs to set/*: must come from feature/*
            if [[ ! "${HEAD_REF}" =~ ^feature/ ]]; then
              echo "::error::PRs to '${BASE_REF}' must come from a 'feature/*' branch. Got: '${HEAD_REF}'"
              exit 1
            fi
          else
            echo "::error::Invalid target branch: '${BASE_REF}'. PRs must target 'main' or 'set/*'."
            exit 1
          fi

          echo "✅ Branch naming check passed"

  main-target-guard:
    name: Main Branch Infrastructure-Only
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base ref
        run: git fetch origin "${{ github.base_ref }}"

      - name: Ensure no skill/extension changes on main
        run: |
          # Files changed relative to main
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" || true)

          # Allowed paths on main (infrastructure only)
          ALLOWED_PATTERNS=(
            "^\.github/"
            "^README\.md$"
            "^CONTRIBUTING\.md$"
            "^LICENSE$"
            "^\.gitignore$"
            "^docs/"
          )

          DISALLOWED=()

          for f in $CHANGED; do
            allowed=false
            for pattern in "${ALLOWED_PATTERNS[@]}"; do
              if [[ "$f" =~ $pattern ]]; then
                allowed=true
                break
              fi
            done
            if [[ "$allowed" == false ]]; then
              DISALLOWED+=("$f")
            fi
          done

          if [[ ${#DISALLOWED[@]} -gt 0 ]]; then
            echo "::error::PRs to 'main' must only touch infrastructure files (docs, CI, meta)."
            echo "::error::The following files are not allowed:"
            for f in "${DISALLOWED[@]}"; do
              echo "::error::  - $f"
            done
            echo ""
            echo "If this is a skill or extension change, target a 'set/*' branch instead."
            exit 1
          fi

          echo "✅ All changed files are infrastructure-only"

  structure-check:
    name: Skills & Extensions Structure
    runs-on: ubuntu-latest
    if: startsWith(github.base_ref, 'set/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate skill structure
        run: |
          SKILLS_DIR="skills"
          ISSUES=0

          if [[ -d "$SKILLS_DIR" ]]; then
            for skill_dir in "$SKILLS_DIR"/*/; do
              [[ -d "$skill_dir" ]] || continue
              skill_name=$(basename "$skill_dir")
              skill_md="${skill_dir}SKILL.md"

              if [[ ! -f "$skill_md" ]]; then
                echo "::error::Skill '${skill_name}' is missing SKILL.md"
                ISSUES=$((ISSUES + 1))
                continue
              fi

              # Check frontmatter
              if ! grep -q "^name:" "$skill_md"; then
                echo "::error::Skill '${skill_name}': SKILL.md missing 'name' in frontmatter"
                ISSUES=$((ISSUES + 1))
              fi

              if ! grep -q "^description:" "$skill_md"; then
                echo "::error::Skill '${skill_name}': SKILL.md missing 'description' in frontmatter"
                ISSUES=$((ISSUES + 1))
              fi
            done
          fi

          if [[ $ISSUES -gt 0 ]]; then
            echo "::error::${ISSUES} skill validation issue(s) found"
            exit 1
          fi

          echo "✅ All skills pass structure validation"

      - name: Validate extension structure
        run: |
          EXTENSIONS_DIR="extensions"
          ISSUES=0

          if [[ -d "$EXTENSIONS_DIR" ]]; then
            for ext_dir in "$EXTENSIONS_DIR"/*/; do
              [[ -d "$ext_dir" ]] || continue
              ext_name=$(basename "$ext_dir")

              if [[ ! -f "${ext_dir}index.ts" ]]; then
                echo "::error::Extension '${ext_name}' is missing index.ts"
                ISSUES=$((ISSUES + 1))
              fi

              if [[ ! -f "${ext_dir}README.md" ]]; then
                echo "::warning::Extension '${ext_name}' is missing README.md"
              fi
            done
          fi

          if [[ $ISSUES -gt 0 ]]; then
            echo "::error::${ISSUES} extension validation issue(s) found"
            exit 1
          fi

          echo "✅ All extensions pass structure validation"

      - name: Detect deletions in unchanged sets
        run: |
          # Fetch base to diff
          git fetch origin "${{ github.base_ref }}" 2>/dev/null || true

          # Check for deleted skill/extension directories
          DELETED=$(git diff --name-only --diff-filter=D "origin/${{ github.base_ref }}...HEAD" -- skills/ extensions/ 2>/dev/null || true)

          if [[ -n "$DELETED" ]]; then
            echo "::warning::The following files/directories were deleted:"
            echo "$DELETED"
            echo ""
            echo "⚠️  Deletions should be intentional and explained in the PR description."
            echo "    If these are accidental, revert them."
          fi

  auto-label:
    name: Auto-Label PR
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply labels
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          REPO="${{ github.repository }}"
          LABELS_TO_ADD=()

          # Label by target branch
          if [[ "${BASE_REF}" == main ]]; then
            LABELS_TO_ADD+=("infra")
          elif [[ "${BASE_REF}" == set/* ]]; then
            # Add the set branch itself as a label
            LABELS_TO_ADD+=("${BASE_REF}")
          fi

          # Label by changed content
          git fetch origin "${BASE_REF}" 2>/dev/null || true
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || true)

          if echo "$CHANGED" | grep -q "^skills/"; then
            LABELS_TO_ADD+=("skill")
          fi
          if echo "$CHANGED" | grep -q "^extensions/"; then
            LABELS_TO_ADD+=("extension")
          fi

          # Apply labels via gh CLI
          if [[ ${#LABELS_TO_ADD[@]} -gt 0 ]]; then
            echo "Applying labels: ${LABELS_TO_ADD[*]}"
            for label in "${LABELS_TO_ADD[@]}"; do
              # Create label if it doesn't exist (for new set/* labels)
              gh label create "$label" --repo "$REPO" --force 2>/dev/null || true
              gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$label"
            done
          fi
          echo "✅ Labels applied"
